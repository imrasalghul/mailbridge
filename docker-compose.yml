services:
  mail-bridge:
    build: .
    container_name: mail-bridge
    restart: unless-stopped
    ports:
      - "3090:3090"
    env_file: .env
    volumes:
      - "./data:/app/data"
      - "./secrets:/app/secrets"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
